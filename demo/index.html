<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kakitori demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: sans-serif;
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
        background: #fafafa;
        color: #222;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      header h1 { margin-bottom: 0; }
      header a { font-size: 0.9rem; color: #0366d6; }
      p.desc {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      p.desc a { color: #0366d6; }
      button {
        padding: 6px 16px;
        font-size: 0.9rem;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
      }
      button:hover { background: #f0f0f0; }

      /* Practice */
      #practice {
        display: none;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #ccc;
      }
      #practice .controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      #practice-body {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      #writer-col {
        flex-shrink: 0;
      }
      #writer {
        border: 1px solid #ddd;
        background: #fff;
        border-radius: 4px;
      }
      #result {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        width: 300px;
      }
      #stroke-slots {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 4px;
      }
      .stroke-slot {
        padding: 2px 6px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: monospace;
        font-size: 0.8rem;
        color: #999;
      }
      .stroke-slot.ok {
        border-color: #4a4;
        color: #4a4;
        background: #effe8f;
      }
      .stroke-slot.ng {
        border-color: #c44;
        color: #c44;
        background: #fee;
      }
      #summary {
        font-size: 0.8rem;
        color: #666;
        min-height: 1.2em;
      }
      #log {
        height: 300px;
        overflow-y: auto;
        flex: 1;
        min-width: 0;
        font-size: 11px;
        border: 1px solid #ddd;
        background: #fff;
        border-radius: 4px;
        padding: 8px;
        text-align: left;
        font-family: monospace;
      }

      /* Gallery */
      .section-header {
        cursor: pointer;
        user-select: none;
        padding: 0.5rem 0;
        font-size: 1.1rem;
        font-weight: bold;
        border-bottom: 1px solid #ccc;
        margin-top: 0.5rem;
      }
      .section-header::before { content: "▶ "; font-size: 0.8em; }
      .section-header.open::before { content: "▼ "; font-size: 0.8em; }
      .char-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        padding: 0.5rem 0;
      }
      .char-cell {
        width: 60px;
        height: 60px;
      }
      .char-cell svg { display: block; }
      .char-cell:hover { background: #eef; }
    </style>
  </head>
  <body>
    <header>
      <h1>kakitori demo</h1>
    </header>
    <p class="desc">
      Kanji writing practice library with stroke ending judgment (tome / hane / harai).
      <a href="https://github.com/k1LoW/kakitori" target="_blank" rel="noopener noreferrer">GitHub</a>
    </p>

    <div id="practice">
      <div class="controls">
        <span id="practice-char" style="font-size: 1.5rem; margin-right: 0.5rem;"></span>
        <button id="quiz-btn">練習開始</button>
        <button id="animate-btn">お手本</button>
        <button id="highlight-btn">次の画</button>
      </div>
      <div id="practice-body">
        <div id="writer-col">
          <div id="writer"></div>
          <div id="result">
            <div id="stroke-slots"></div>
            <div id="summary"></div>
          </div>
        </div>
        <pre id="log"></pre>
      </div>
    </div>

    <div id="gallery"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
